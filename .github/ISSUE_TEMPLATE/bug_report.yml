name: Bug Report
description: Report a defect in runtime control-plane, probe bridge, or browser worker behavior
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Exact steps, inputs, or requests that reproduce the issue
      placeholder: |
        1. Start the control plane
        2. Send a runtime event batch
        3. Observe incorrect task state
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which checks were run locally?
      placeholder: |
        - npm run typecheck
        - npm test
        - ./scripts/demo-control-plane.sh
        - cd services/probe-bridge && ./.venv/bin/python -m unittest -v test_app.py

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Payloads
      description: Paste only the minimal logs, requests, or responses needed to understand the issue

