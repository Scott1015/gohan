name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  probe-bridge:
    name: Probe Bridge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install probe bridge dependencies
        working-directory: services/probe-bridge
        run: pip install -r requirements.txt

      - name: Run probe bridge tests
        working-directory: services/probe-bridge
        run: python -m unittest -v test_app.py
